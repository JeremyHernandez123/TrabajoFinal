<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <header>
        <section class="contenedor-menu"> 
            <div class="titulo-menu">

            </div>
    </section>
    </header>
    <h1>Crear Nova Tasca</h1>
    <form action="/crear-tasca" method="POST" class="formulari-crear-tasca">
        <label for="titol">Títol:</label>
        <input type="text" id="titol" class="input-crear-tasca" name="titol" required>

        <label for="descripcio">Descripció:</label>
        <textarea id="descripcio" class="input-crear-tasca" name="descripcio" required></textarea>

        <label for="data">Data de venciment:</label>
        <input type="date" id="data" class="input-crear-tasca" name="data" required>

        <label for="categoria">Categoria:</label>
        <select name="categoria" id="categoria" class="input-crear-tasca" required>
        <!--<option value="Personal">Personal</option>
            <option value="Treball">Treball</option>
            <option value="Estudis">Estudis</option> Poner categorias desde js-->
        </select>

        <label for="prioritat">Prioritat:</label>
        <select name="prioritat" id="prioritat" class="input-crear-tasca" required>
        <option value="Baixa">Baixa</option>
            <option value="Mitjana">Mitjana</option>
            <option value="Alta">Alta</option>  
        </select>

        <button type="submit" class="crear-tasca-boton">Crear Tasca</button>
    </form>
</body>
</html>
